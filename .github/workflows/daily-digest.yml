name: Daily UNjobs digest

on:
  schedule:
    # 06:00 WAT (UTC+1) = 05:00 UTC
    - cron: "0 5 * * *"
    # 20:00 WAT (8pm, UTC+1) = 19:00 UTC
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: unjobs-digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Prepare data directory
        run: mkdir -p data && test -f data/seen_jobs.json || echo '{}' > data/seen_jobs.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
          SENDER_EMAIL: ${{ secrets.GMAIL_USER }}
          SENDER_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.NOTIFY_TO_EMAIL }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          UNJOBS_URL: https://unjobs.org/new
          MAX_PAGES: "20"
          MAX_DETAIL_FETCHES: "50"
          REQUEST_DELAY_SECONDS: "0.5"
          STATE_PATH: data/seen_jobs.json
        run: python scripts/unjobs_daily_digest.py

      - name: Commit seen-jobs state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update seen UNjobs vacancies [skip ci]"
            git push
          fi
